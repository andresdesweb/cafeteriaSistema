<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Punto de Venta</title>
    <link rel="stylesheet" href="css/estilos.css?v=2">
</head>
<body>

    <div class="nav">
        <a href="index">← Volver al Menú Principal</a>
    </div>

    <div class="pos-layout">
        
        <div class="pos-main">
            <input type="text" id="buscador" placeholder="🔍 Buscar producto...">
            
            <div class="pos-categorias">
                <button class="btn-categoria activa" onclick="filtrarCategoria('Todos')">All Items</button>
                <button class="btn-categoria" onclick="filtrarCategoria('Coffee')">Coffee</button>
                <button class="btn-categoria" onclick="filtrarCategoria('Tea')">Tea</button>
                <button class="btn-categoria" onclick="filtrarCategoria('Snack')">Snack</button>
            </div>

            <div class="pos-grid" id="cuerpoMenu">
                </div>
        </div>

        <div class="pos-sidebar">
            <h2>Orden Actual</h2>
            
            <div class="cart-items" id="cuerpoTicket">
                </div>
            
            <div class="cart-total-section">
                <div class="cart-total-row">
                    <span>Total:</span>
                    <span>$<span id="totalVenta">0.00</span></span>
                </div>
            </div>
            
            <button id="btnCobrar" class="btn-cobrar-pos" onclick="procesarVenta()">Cobrar Orden</button>
        </div>

    </div>

    <script src="js/ventas.js?v=2"></script>
</body>
</html>
