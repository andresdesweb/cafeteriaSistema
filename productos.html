<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos</title>
    <link rel="stylesheet" href="css/estilos.css?v=3">
</head>
<body>

    <div class="nav">
        <a href="index">← Volver al Menú Principal</a>
    </div>

    <div class="contenedor">
        <div class="panel">
            <h2>Nuevo Producto</h2>
            <form id="formProducto">
                <input type="text" id="nombre" placeholder="Nombre del producto" required>
                
                <select id="categoria" required style="width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="" disabled selected>Selecciona una categoría...</option>
                    <option value="Coffee">Coffee</option>
                    <option value="Tea">Tea</option>
                    <option value="Snack">Snack</option>
                </select>

                <textarea id="descripcion" placeholder="Descripción breve" required></textarea>
                <input type="number" id="precio" placeholder="Precio de venta" step="0.01" required>
                <input type="number" id="stock" placeholder="Stock Inicial" required>
                
                <input type="url" id="imagen_url" placeholder="URL de la imagen (opcional)">
                
                <button type="submit">Guardar Producto</button>
            </form>
            <div id="mensaje"></div>
        </div>

        <div class="panel" style="flex: 2;">
            <h2>Inventario Actual</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Foto</th> <th>Nombre</th>
                        <th>Categoría</th> <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="js/productos.js?v=3"></script>
</body>
</html>
